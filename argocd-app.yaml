apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-processing-api
  namespace: argocd
spec:
  project: default

  # WHERE TO GET THE CODE
  # ArgoCD watches this repo and branch
  # When values.yaml changes, it syncs automatically
  source:
    repoURL: https://github.com/JULIET-JULIET632/order-processing-api.git
    targetRevision: main
    path: chart
    helm:
      valueFiles:
        - values.yaml

  # WHERE TO DEPLOY
  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
