apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ .Release.Name }}-analysis
spec:
  metrics:
    # METRIC 1: Error rate
    # Queries Prometheus for 5xx responses on canary pods
    # If error rate exceeds 5% → rollback
    - name: error-rate
      interval: 30s
      count: 5
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{status=~"5.."}[2m]))
            /
            sum(rate(http_requests_total[2m])) * 100

    # METRIC 2: p95 response time
    # If 95th percentile latency exceeds 500ms → rollback
    - name: p95-response-time
      interval: 30s
      count: 5
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket[2m])) by (le)
            )
      successCondition: result[0] < 0.5
